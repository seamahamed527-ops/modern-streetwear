<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siyam Streetwear | Admin Panel Edition</title>
    <style>
        /* বেসিক স্টাইল */
        body { font-family: 'Arial', sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        header { background: #131921; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* অ্যাডমিন প্যানেল ও টেবিল স্টাইল */
        #adminDashboard { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2874f0; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        
        .admin-btn { background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .close-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; float: right; }
    </style>
</head>
<body onload="checkUserStatus()">

<header>
    <div style="font-size: 20px; font-weight: bold;">SIYAM STREETWEAR</div>
    <div onclick="openAdmin()" style="cursor:pointer; font-size: 24px; padding: 0 10px;">⋮</div>
</header>

<div class="container">
    <div id="welcomeMsg"></div>
    
    <div class="card">
        <h3>Premium Oversized T-shirt</h3>
        <p>দাম: ৳ 400</p>
        <button onclick="makeOrder('Premium Oversized T-shirt')" style="background: #fb641b; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px;">অর্ডার করুন</button>
    </div>
</div>

<div id="adminDashboard">
    <button class="close-btn" onclick="closeAdmin()">বন্ধ করুন</button>
    <h2 style="color: #131921;">অর্ডার ম্যানেজমেন্ট (গুগল শিট ভিউ)</h2>
    
    <table>
        <thead>
            <tr>
                <th>কাস্টমারের নাম</th>
                <th>পণ্যের নাম</th>
                <th>তারিখ</th>
                <th>স্ট্যাটাস</th>
                <th>অ্যাকশন</th>
            </tr>
        </thead>
        <tbody id="orderTableBody">
            </tbody>
    </table>
</div>

<script>
    // ১. কাস্টমার চেক ও অটো-লগইন
    function checkUserStatus() {
        let name = localStorage.getItem("c_name");
        if (!name) {
            name = prompt("আপনার নাম লিখুন:");
            if (name) localStorage.setItem("c_name", name);
        }
        if(name) document.getElementById("welcomeMsg").innerHTML = "গোপন পাসওয়ার্ড দিয়ে অ্যাডমিন প্যানেল চেক করুন।";
    }

    // ২. অর্ডার সেভ করা
    function makeOrder(pName) {
        let customer = localStorage.getItem("c_name") || "অজানা কাস্টমার";
        let orders = JSON.parse(localStorage.getItem("all_orders") || "[]");
        
        let newOrder = {
            customerName: customer,
            productName: pName,
            date: new Date().toLocaleString(),
            status: "Pending"
        };
        
        orders.push(newOrder);
        localStorage.setItem("all_orders", JSON.stringify(orders));
        
        alert("অর্ডার সফল হয়েছে! সরাসরি হোয়াটসঅ্যাপে যোগাযোগ করুন।");
        window.location.href = "https://wa.me/8801956273611?text=আমি " + pName + " অর্ডার করতে চাই।";
    }

    // ৩. পাসওয়ার্ড দিয়ে অ্যাডমিন প্যানেল খোলা
    function openAdmin() {
        let pass = prompt("অ্যাডমিন পাসওয়ার্ড দিন:");
        if (pass === "2314") { // তোমার দেওয়া গোপন পাসওয়ার্ড
            document.getElementById("adminDashboard").style.display = "block";
            loadOrders();
        } else {
            alert("ভুল পাসওয়ার্ড! এটি শুধু অ্যাডমিনের জন্য।");
        }
    }

    // ৪. গুগল শিট স্টাইলে অর্ডার লোড করা
    function loadOrders() {
        let orders = JSON.parse(localStorage.getItem("all_orders") || "[]");
        let tableBody = document.getElementById("orderTableBody");
        tableBody.innerHTML = "";

        orders.forEach((order, index) => {
            let row = `<tr>
                <td>${order.customerName}</td>
                <td>${order.productName}</td>
                <td>${order.date}</td>
                <td id="status-${index}">${order.status}</td>
                <td><button onclick="confirmItem(${index})" style="background: green; color: white; border: none; padding: 5px; border-radius: 3px; cursor: pointer;">কনফার্ম</button></td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    function confirmItem(index) {
        let orders = JSON.parse(localStorage.getItem("all_orders") || "[]");
        orders[index].status = "Confirmed ✅";
        localStorage.setItem("all_orders", JSON.stringify(orders));
        loadOrders(); // টেবিল রিফ্রেশ
    }

    function closeAdmin() {
        document.getElementById("adminDashboard").style.display = "none";
    }
</script>

</body>
</html>
