<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Heart - Chapter 11</title>
    <style>
        :root { --main-red: #e94560; --dark-bg: #1a1a2e; --box-bg: rgba(0, 0, 0, 0.85); }
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; margin: 0; display: flex; justify-content: center; overflow: hidden; height: 100vh; }
        
        #game-container { width: 100%; max-width: 450px; height: 100%; position: relative; background: #222; overflow: hidden; border: 2px solid #333; }

        /* Character Images */
        #character-img { width: 100%; height: 70%; object-fit: cover; transition: opacity 0.5s ease-in-out; }

        /* Dialogue UI */
        #ui-layer { position: absolute; bottom: 0; width: 100%; height: 35%; background: linear-gradient(transparent, var(--dark-bg)); padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; }
        
        #name-tag { background: var(--main-red); color: white; padding: 5px 15px; font-weight: bold; font-size: 14px; border-radius: 4px; align-self: flex-start; margin-bottom: 10px; border: 1px solid #fff; }
        
        #dialogue-text { font-size: 16px; line-height: 1.4; color: #eee; min-height: 60px; text-shadow: 1px 1px 2px #000; }

        /* Choices */
        #choice-box { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .choice-btn { background: rgba(233, 69, 96, 0.2); border: 1px solid var(--main-red); color: white; padding: 10px; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.3s; font-size: 14px; }
        .choice-btn:hover { background: var(--main-red); box-shadow: 0 0 10px var(--main-red); }

        .fade { animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="game-container">
    <img id="character-img" src="https://via.placeholder.com/450x600?text=Adeeva+Portrait" alt="Character">
    
    <div id="ui-layer">
        <div id="name-tag">System</div>
        <div id="dialogue-text" class="fade">Initializing Chapter 11...</div>
        <div id="choice-box"></div>
    </div>
</div>

<script>
    const storyData = {
        start: {
            name: "Adeeva",
            text: "I am already tired of this so-called husband. I think it's time for me to escape... I need to find my disguise.",
            img: "https://via.placeholder.com/450x600?text=Adeeva+Disguise",
            choices: [
                { text: "Go to the closet and pack", next: "closet" }
            ]
        },
        closet: {
            name: "Adeeva",
            text: "I wore the disguise, but the guards are everywhere. It's too risky. I'll wait in the courtyard for fresh air.",
            img: "https://via.placeholder.com/450x600?text=Courtyard+Scene",
            choices: [
                { text: "Go to the courtyard", next: "courtyard" }
            ]
        },
        courtyard: {
            name: "Adeeva",
            text: "Suddenly, I feel choked. My heart... it hurts. The lights are getting dim. I can't see anymore...",
            img: "https://via.placeholder.com/450x600?text=Fainting+Scene",
            choices: [
                { text: "Collapse...", next: "bedroom" }
            ]
        },
        bedroom: {
            name: "Xavier",
            text: "Adeeva! Please open your eyes! Doctor, tell me what happened to her!",
            img: "https://via.placeholder.com/450x600?text=Xavier+Anxious",
            choices: [
                { text: "Listen to Doctor", next: "doctor" }
            ]
        },
        doctor: {
            name: "Doctor",
            text: "She has a hole in her heart. She inhaled something toxic. Give her hot Chilli Soup and keep her on drip.",
            img: "https://via.placeholder.com/450x600?text=Doctor+Advice",
            choices: [
                { text: "Wait 5 hours...", next: "wake_up" }
            ]
        },
        wake_up: {
            name: "Xavier",
            text: "Deeva, wake up love. I made you beef chilli pepper soup. You need to eat, princess.",
            img: "https://via.placeholder.com/450x600?text=Feeding+Scene",
            choices: [
                { text: "Let him feed you", next: "blush" },
                { text: "Try to eat yourself", next: "blush" }
            ]
        },
        blush: {
            name: "Adeeva",
            text: "He licked the crumbs off my lips... I'm falling gradually in love with this guy.",
            img: "https://via.placeholder.com/450x600?text=Blushing+Adeeva",
            choices: [
                { text: "Go to take a bath", next: "bath" }
            ]
        },
        bath: {
            name: "Adeeva",
            text: "He carried me to the bathroom. He was too strong. He gently washed me up for 20 minutes.",
            img: "https://via.placeholder.com/450x600?text=Bathroom+Scene",
            choices: [
                { text: "Jumanah knocks on door", next: "jumanah" }
            ]
        },
        jumanah: {
            name: "Jumanah",
            text: "My lady, you're finally awake! I was so worried when the news got to me.",
            img: "https://via.placeholder.com/450x600?text=Jumanah+Arrives",
            choices: [
                { text: "End Chapter 11", next: "start" }
            ]
        }
    };

    function playScene(key) {
        const scene = storyData[key];
        const textEl = document.getElementById('dialogue-text');
        const nameEl = document.getElementById('name-tag');
        const imgEl = document.getElementById('character-img');
        const choiceBox = document.getElementById('choice-box');

        // Reset Animation
        textEl.classList.remove('fade');
        void textEl.offsetWidth; 
        textEl.classList.add('fade');

        // Set Content
        nameEl.innerText = scene.name;
        textEl.innerText = scene.text;
        imgEl.src = scene.img;

        // Clear and add choices
        choiceBox.innerHTML = '';
        scene.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice.text;
            btn.onclick = () => playScene(choice.next);
            choiceBox.appendChild(btn);
        });
    }

    // Start Game
    playScene('start');
</script>

</body>
</html>
