<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern & Streetwear</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }
    .card img {
      max-width: 100%;
      border-radius: 6px;
    }
    .price {
      font-size: 18px;
      color: #27ae60;
      margin: 10px 0;
    }
    button {
      background: #27ae60;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #219150;
    }
    footer {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body><header>
  <h1>Modern & Streetwear</h1>
  <p>Modern fashion for street lifestyle</p>
</header><div class="container">
  <h2>Products</h2>
  <div class="products"><div class="card">
  <img src="https://via.placeholder.com/300" alt="Item 1">
  <h3>Item One</h3>
  <p>Short description of the item.</p>
  <div class="price">$20</div>
  <button>Buy Now</button>
</div>

<div class="card">
  <img src="https://via.placeholder.com/300" alt="Item 2">
  <h3>Item Two</h3>
  <p>Short description of the item.</p>
  <div class="price">$35</div>
  <button>Buy Now</button>
</div>

<div class="card">
  <img src="https://via.placeholder.com/300" alt="Item 3">
  <h3>Item Three</h3>
  <p>Short description of the item.</p>
  <div class="price">$50</div>
  <button>Buy Now</button>
</div>

  </div>
</div><footer>
  <p>&copy; 2026 Modern & Streetwear. All rights reserved.</p>
</footer></body>
</html>
