<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Streetware - Shop</title>
    <style>
        /* CSS স্টাইল */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        header {
            background-color: #ffffff;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            color: #333;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* প্রোডাক্ট গ্রিড */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 300px;
            background-color: #ddd; /* ছবির জায়গায় ডামি কালার */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
        }

        .product-info {
            padding: 15px;
        }

        .product-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .product-price {
            color: #e67e22;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* হোয়াটসঅ্যাপ বাটন */
        .buy-btn {
            display: inline-block;
            background-color: #25d366;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .buy-btn:hover {
            background-color: #128c7e;
        }

        @media (max-width: 600px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr); /* মোবাইলে এক সারিতে ২ টি ছবি */
                gap: 10px;
            }
            .product-image { height: 200px; }
            .product-title { font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Modern Streetware</h1>
    </header>

    <div class="container">
        <div class="product-grid">
            
            <div class="product-card">
                <div class="product-image">Product Image</div>
                <div class="product-info">
                    <div class="product-title">Street Style Hoodie</div>
                    <div class="product-price">৳ ১২৫০</div>
                    <a href="https://wa.me/YOUR_NUMBER?text=I want to buy Street Style Hoodie" class="buy-btn">অর্ডার করতে হোয়াটসঅ্যাপ করুন</a>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">Product Image</div>
                <div class="product-info">
                    <div class="product-title">Premium Cargo Pant</div>
                    <div class="product-price">৳ ৯৫০</div>
                    <a href="https://wa.me/YOUR_NUMBER?text=I want to buy Premium Cargo Pant" class="buy-btn">অর্ডার করতে হোয়াটসঅ্যাপ করুন</a>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">Product Image</div>
                <div class="product-info">
                    <div class="product-title">Oversized T-Shirt</div>
                    <div class="product-price">৳ ৬৫০</div>
                    <a href="https://wa.me/YOUR_NUMBER?text=I want to buy Oversized T-Shirt" class="buy-btn">অর্ডার করতে হোয়াটসঅ্যাপ করুন</a>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">Product Image</div>
                <div class="product-info">
                    <div class="product-title">Streetwear Cap</div>
                    <div class="product-price">৳ ৪৫০</div>
                    <a href="https://wa.me/YOUR_NUMBER?text=I want to buy Streetwear Cap" class="buy-btn">অর্ডার করতে হোয়াটসঅ্যাপ করুন</a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
